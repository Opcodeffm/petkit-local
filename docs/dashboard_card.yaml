# Lovelace Dashboard Card — Petkit Feeder Local
#
# How to use:
#   1. HA → Settings → Dashboards → pick a dashboard → "Edit" (top right)
#   2. "+ ADD CARD" → scroll down → "Manual"
#   3. Paste the YAML block below (starting at "type: vertical-stack")
#   4. Done. To edit the schedule: Settings → Devices & Services →
#      Petkit Feeder Local → Configure
#
# The entity IDs below assume the integration was set up with the default
# device name "Petkit Feeder" → entity IDs like sensor.petkit_feeder_*.
# If you renamed the device during setup, do a find-and-replace in the
# YAML, e.g. "petkit_feeder" → "my_feeder".
#
# This card shows:
#   - current feeding schedule (text + entry count)
#   - status (online/offline, power source, battery)
#   - desiccant counter (with reset button)
#   - feedings/amount today
#   - quick-feed buttons
#   - switches (LED, sound, key lock)
#   - link to the schedule editor (options flow)

type: vertical-stack
cards:
  # --- Status + schedule ---
  - type: entities
    title: Petkit Feeder
    show_header_toggle: false
    entities:
      - entity: binary_sensor.petkit_feeder_connection
        name: Connection
        icon: mdi:cloud-check
      - entity: sensor.petkit_feeder_firmware
        name: Firmware
      - type: section
        label: Feeding schedule
      - entity: sensor.petkit_feeder_feeding_schedule
        name: Schedule
        icon: mdi:calendar-clock
      - type: weblink
        url: /config/integrations/integration/petkit_feeder
        name: Edit schedule
        icon: mdi:pencil
      - type: section
        label: Today
      - entity: sensor.petkit_feeder_feedings_today
        name: Feedings
        icon: mdi:counter
      - entity: sensor.petkit_feeder_food_dispensed_today
        name: Amount
        icon: mdi:scale

  # --- Quick feed buttons ---
  - type: horizontal-stack
    cards:
      - type: button
        entity: button.petkit_feeder_feed_1_portion
        name: "1× (10g)"
        icon: mdi:food-drumstick
        show_state: false
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.petkit_feeder_feed_1_portion
      - type: button
        entity: button.petkit_feeder_feed_2_portions
        name: "2× (20g)"
        icon: mdi:food-drumstick
        show_state: false
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.petkit_feeder_feed_2_portions
      - type: button
        entity: button.petkit_feeder_feed_5_portions
        name: "5× (50g)"
        icon: mdi:food-drumstick
        show_state: false
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.petkit_feeder_feed_5_portions

  # --- Device state ---
  - type: entities
    title: State
    show_header_toggle: false
    entities:
      - entity: sensor.petkit_feeder_food_container
        name: Food container
        icon: mdi:silo
      - entity: sensor.petkit_feeder_desiccant_days_left
        name: Desiccant
        icon: mdi:water-opacity
      - type: call-service
        name: Desiccant replaced
        icon: mdi:restart
        service: petkit_feeder.reset_desiccant

  # --- Power + WiFi ---
  - type: entities
    title: Power & connection
    show_header_toggle: false
    entities:
      - entity: sensor.petkit_feeder_power_source
        name: Power source
      - entity: sensor.petkit_feeder_battery_status
        name: Battery status
      - entity: sensor.petkit_feeder_battery
        name: Battery level
      - entity: sensor.petkit_feeder_wifi_signal
        name: WiFi

  # --- Device settings ---
  - type: entities
    title: Settings
    show_header_toggle: false
    entities:
      - entity: switch.petkit_feeder_led_display
        name: LED display
      - entity: switch.petkit_feeder_feeding_sound
        name: Feeding sound
      - entity: switch.petkit_feeder_key_lock
        name: Key lock
