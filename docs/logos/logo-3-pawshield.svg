<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Cat Shield v6: big cat head centered, no firewall elements -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0 L0 0 0 32" fill="none" stroke="#1e3a8a" stroke-width="0.5" opacity="0.4"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="512" height="512" rx="48" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="512" rx="48" fill="url(#grid)"/>

  <!-- Corner circuit accents -->
  <g stroke="#3b82f6" stroke-width="2" opacity="0.6" fill="none">
    <path d="M24 80 L24 40 L64 40"/>
    <path d="M488 80 L488 40 L448 40"/>
    <path d="M24 432 L24 472 L64 472"/>
    <path d="M488 432 L488 472 L448 472"/>
  </g>
  <g fill="#3b82f6">
    <circle cx="24" cy="40" r="3"/>
    <circle cx="488" cy="40" r="3"/>
    <circle cx="24" cy="472" r="3"/>
    <circle cx="488" cy="472" r="3"/>
  </g>

  <!-- Hexagonal shield -->
  <g transform="translate(256, 240)">
    <path d="M 0 -160 L 132 -90 L 132 70 Q 132 140 0 170 Q -132 140 -132 70 L -132 -90 Z"
          fill="#0f172a" stroke="#3b82f6" stroke-width="3"/>
    <path d="M 0 -142 L 117 -80 L 117 62 Q 117 125 0 152 Q -117 125 -117 62 L -117 -80 Z"
          fill="none" stroke="#1e40af" stroke-width="1" opacity="0.6"/>

    <!-- Cat head silhouette — larger, shifted down to clear shield top -->
    <g fill="#3b82f6" transform="translate(0, 22)">
      <!-- Ears (pointed) -->
      <path d="M -100 -70 L -70 -130 L -40 -55 Z"/>
      <path d="M 40 -55 L 70 -130 L 100 -70 Z"/>
      <!-- Inner ear darks -->
      <path d="M -86 -72 L -70 -115 L -54 -68 Z" fill="#0f172a"/>
      <path d="M 54 -68 L 70 -115 L 86 -72 Z" fill="#0f172a"/>
      <!-- Face (rounded wide head) -->
      <path d="M -108 -48 Q -110 -85 -75 -95 L 75 -95 Q 110 -85 108 -48 L 108 30 Q 108 80 60 100 Q 30 115 0 115 Q -30 115 -60 100 Q -108 80 -108 30 Z"/>
      <!-- Eyes (slanted, confident) -->
      <g fill="#0f172a">
        <path d="M -58 -20 L -30 -30 L -34 -6 L -60 -2 Z"/>
        <path d="M 58 -20 L 30 -30 L 34 -6 L 60 -2 Z"/>
      </g>
      <!-- Nose (triangle) -->
      <path d="M -9 25 L 9 25 L 0 40 Z" fill="#0f172a"/>
      <!-- Mouth -->
      <path d="M 0 40 L 0 55" stroke="#0f172a" stroke-width="2.5" fill="none"/>
      <path d="M -16 60 Q 0 68 16 60" stroke="#0f172a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Bottom terminal-style label -->
  <g transform="translate(256, 458)">
    <rect x="-100" y="-16" width="200" height="32" fill="none" stroke="#3b82f6" stroke-width="1.5" rx="2"/>
    <text x="0" y="5" text-anchor="middle"
          font-family="ui-monospace, 'SF Mono', Consolas, monospace"
          font-size="13" font-weight="700" fill="#3b82f6" letter-spacing="2">
      UPLINK_BLOCKED
    </text>
  </g>
</svg>
