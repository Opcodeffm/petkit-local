set_schedule:
  name: Set feeding schedule
  description: >
    Replaces the complete feeding schedule on the feeder. All existing entries are overwritten.
    The schedule is persisted and restored after HA restart. Max. 10 entries per weekday.
  fields:
    entries:
      name: Entries
      description: >
        List of feedings — each with time (HH:MM), amount (grams, 1-200),
        and optional days (list: [1..7] or [mon,tue,...]) and name.
      required: true
      example: |
        - time: "08:00"
          amount: 20
          days: [mon, tue, wed, thu, fri, sat, sun]
          name: Morning
        - time: "18:30"
          amount: 15
          days: [mon, tue, wed, thu, fri]
          name: Evening
      selector:
        object:

clear_schedule:
  name: Clear feeding schedule
  description: Removes all entries from the feeding schedule.

reset_desiccant:
  name: Reset desiccant
  description: >
    Resets the desiccant counter (after replacing the silica gel pack).
    New lifetime: 30 days. Persisted across restarts.

feed:
  name: Feed manually
  description: Dispenses a portion of food (executed on the next heartbeat).
  fields:
    amount:
      name: Amount (g)
      description: Food amount in grams (1-200).
      required: true
      example: 10
      default: 10
      selector:
        number:
          min: 1
          max: 200
          step: 1
          unit_of_measurement: g
